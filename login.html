<!DOCTYPE html>
<html lang="en" data-theme="dark" data-persona="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | StudyVerse</title>
  <link rel="stylesheet" href="styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
</head>
<body class="login-page">
  <div class="login-container">
    <!-- Left Side: Branding -->
    <div class="login-branding">
      <div class="logo">
        <span class="logo-icon">⭐</span>
        <span class="logo-text">StudyVerse</span>
      </div>
      <p class="tagline">Your educational universe. Log in to access tools, track progress, and learn without limits.</p>
    </div>

    <!-- Right Side: Login Form -->
    <div class="login-form">
      <h1>Welcome to StudyVerse</h1>

      <!-- OAuth Buttons -->
      <div class="oauth-buttons">
        <button class="oauth-button google" onclick="loginWithGoogle()">
          <svg class="oauth-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Continue with Google</span>
        </button>
        <button class="oauth-button apple" onclick="loginWithApple()">
          <svg class="oauth-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.332 12c0-1.657-1.343-3-3-3s-3 1.343-3 3 1.343 3 3 3 3-1.343 3-3z" fill="#fff"/>
            <path d="M12 18.5c2.348 0 4.332-1.5 5-2.5-1.5-2.5-3.5-4-5-4s-3.5 1.5-5 4c.668 1 2.652 2.5 5 2.5z" fill="#fff"/>
            <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0z" fill="#000"/>
          </svg>
          <span>Continue with Apple</span>
        </button>
        <button class="oauth-button microsoft" onclick="loginWithMicrosoft()">
          <svg class="oauth-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12.5 0C5.67 0 0 5.67 0 12.5S5.67 25 12.5 25 25 19.33 25 12.5 19.33 0 12.5 0z" fill="#F25022"/>
            <path d="M12.5 2.5C6.84 2.5 2.5 6.84 2.5 12.5S6.84 22.5 12.5 22.5 22.5 18.16 22.5 12.5 18.16 2.5 12.5 2.5z" fill="#7FBA00"/>
            <path d="M12.5 5c4.14 0 7.5 3.36 7.5 7.5s-3.36 7.5-7.5 7.5S5 16.64 5 12.5 8.36 5 12.5 5z" fill="#00A4EF"/>
            <path d="M12.5 7.5c3.04 0 5.5 2.46 5.5 5.5s-2.46 5.5-5.5 5.5S7 15.54 7 12.5 9.46 7.5 12.5 7.5z" fill="#FFB900"/>
          </svg>
          <span>Continue with Microsoft</span>
        </button>
      </div>

      <div class="divider">
        <span>or</span>
      </div>

      <!-- Email/Password Form -->
      <form id="emailLoginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <a href="#" class="forgot-password" onclick="event.preventDefault(); forgotPassword()">Forgot Password?</a>
        <button type="submit" class="login-button">Log In</button>
      </form>

      <p class="signup-prompt">New here? <a href="#" onclick="event.preventDefault(); showSignup()">Sign Up</a></p>
    </div>
  </div>

  <!-- Firebase Auth Script -->
  <script src="scripts/app.js"></script>
</body>
</html>
