<!DOCTYPE html>
<html lang="en" data-theme="dark" data-persona="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | StudyVerse</title>
  <link rel="stylesheet" href="styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
</head>
<body class="login-page">

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <div class="login-container">

    <!-- ===== LEFT: Branding ===== -->
    <div class="login-branding">
      <div class="logo">
        <span class="logo-icon">⭐</span>
        <span class="logo-text">StudyVerse</span>
      </div>
      <p class="tagline">Your educational universe. Log in to access tools, track progress, and learn without limits.</p>
    </div>

    <!-- ===== RIGHT: Login Form ===== -->
    <div class="login-form">
      <h1 id="formTitle">Welcome to StudyVerse</h1>

      <!-- OAuth Buttons -->
      <div class="oauth-buttons" id="oauthSection">
        <button class="oauth-button google" onclick="loginWithGoogle()">
          <!-- Google SVG icon -->
          <svg class="oauth-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Continue with Google</span>
        </button>

        <button class="oauth-button apple" onclick="loginWithApple()">
          <!-- Apple SVG icon -->
          <svg class="oauth-icon" viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
            <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.2 133.4-316.9 264.8-316.9 70.1 0 128.6 42.5 170.9 42.5 40.8 0 109.9-45.7 188.3-45.7 22.8 0 107.7 2.6 167.5 100.3zm-234.6-108.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z" fill="#fff"/>
          </svg>
          <span>Continue with Apple</span>
        </button>

        <button class="oauth-button microsoft" onclick="loginWithMicrosoft()">
          <!-- Microsoft SVG icon -->
          <svg class="oauth-icon" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
            <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
            <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
            <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
          </svg>
          <span>Continue with Microsoft</span>
        </button>
      </div>

      <div class="divider" id="dividerEl"><span>or</span></div>

      <!-- Email/Password Form (Login mode) -->
      <div id="emailSection">
        <div id="loginForm">
          <input type="email" id="email" class="auth-input" placeholder="Email" autocomplete="email" required>
          <input type="password" id="password" class="auth-input" placeholder="Password" autocomplete="current-password" required>
          <a href="#" class="forgot-password" onclick="event.preventDefault(); forgotPassword()">Forgot Password?</a>
          <button class="login-button" onclick="emailLogin()">Log In</button>
        </div>

        <!-- Sign-up Form (hidden by default) -->
        <div id="signupForm" style="display:none;">
          <input type="email" id="signupEmail" class="auth-input" placeholder="Email" autocomplete="email" required>
          <input type="password" id="signupPassword" class="auth-input" placeholder="Password (min 8 chars)" autocomplete="new-password" required>
          <input type="password" id="signupPasswordConfirm" class="auth-input" placeholder="Confirm Password" autocomplete="new-password" required>
          <button class="login-button" onclick="emailSignup()">Create Account</button>
        </div>
      </div>

      <!-- Toggle between login / signup -->
      <p class="signup-prompt" id="formTogglePrompt">
        New here? <a href="#" onclick="event.preventDefault(); showSignup()">Sign Up</a>
      </p>
    </div>

  </div>

  <script src="scripts/app.js"></script>
</body>
</html>
