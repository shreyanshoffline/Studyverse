<!DOCTYPE html>
<html lang="en" data-theme="dark" data-persona="default">
<head>
  <!-- Existing head content -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyVerse | Your Educational Universe</title>
  <link rel="stylesheet" href="styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">⭐</span>
        <span class="logo-text">StudyVerse</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-view="dashboard">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="#" class="nav-item" data-view="favorites">
          <span class="nav-icon">⭐</span>
          <span class="nav-label">Favorites</span>
        </a>
        <a href="#" class="nav-item" data-view="settings">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label">Settings</span>
        </a>
      </nav>
      <!-- User Greeting + Logout -->
      <div class="sidebar-bottom">
        <div class="user-greeting" id="userGreeting">Hi User!</div>
        <button class="nav-item logout-btn" onclick="logout()">
          <span class="nav-icon">🔒</span>
          <span class="nav-label">Log Out</span>
        </button>
      </div>
    </aside>

    <!-- Main Content (Existing) -->
    <main class="main-content">
      <!-- Your existing views (dashboard, favorites, etc.) -->
      <section id="dashboard" class="view active">
        <header class="view-header">
          <div>
            <h1 class="view-title">Your Study Universe</h1>
            <p class="view-subtitle">What are we studying today?</p>
          </div>
          <div class="header-search">
            <input type="text" class="search-input" placeholder="Search tools...">
          </div>
        </header>
        <div class="tools-grid" id="appGrid"></div>
      </section>
      <!-- Other existing sections (favorites, settings, etc.) -->
    </main>

    <!-- Modal (Existing) -->
    <div class="modal-overlay hidden" id="modalOverlay">
      <div class="modal" id="modal">
        <button class="modal-close" id="modalClose">&times;</button>
        <div class="modal-body" id="modalContent"></div>
      </div>
    </div>

    <!-- Firebase Auth Script -->
    <script src="scripts/app.js"></script>
  </div>
</body>
</html>
