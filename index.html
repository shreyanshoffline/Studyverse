<!DOCTYPE html>
<html lang="en" data-theme="dark" data-persona="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyVerse | Your Educational Universe</title>
  <link rel="stylesheet" href="styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <!-- Firebase SDK (compat version for simplicity) -->
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <!-- Toast container for notifications (replaces alert()) -->
  <div class="toast-container" id="toastContainer"></div>

  <div class="app-shell">
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">⭐</span>
        <span class="logo-text">StudyVerse</span>
      </div>

      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-view="dashboard">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="#" class="nav-item" data-view="favorites">
          <span class="nav-icon">⭐</span>
          <span class="nav-label">Favorites</span>
        </a>
        <a href="settings.html" class="nav-item">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label">Settings</span>
        </a>
      </nav>

      <!-- User greeting + logout -->
      <div class="sidebar-bottom">
        <div class="user-greeting" id="userGreeting">Hi there!</div>
        <button class="nav-item logout-btn" onclick="logout()">
          <span class="nav-icon">🔒</span>
          <span class="nav-label">Log Out</span>
        </button>
      </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">

      <!-- Dashboard View -->
      <section id="dashboard" class="view active">
        <header class="view-header">
          <div>
            <h1 class="view-title">Your Study Universe</h1>
            <p class="view-subtitle">What are we studying today?</p>
          </div>
          <div class="header-search">
            <input type="text" class="search-input" id="searchInput" placeholder="Search tools..." oninput="filterTools(this.value)">
          </div>
        </header>
        <!-- Tool cards rendered here by app.js -->
        <div class="tools-grid" id="appGrid"></div>
      </section>

      <!-- Favorites View -->
      <section id="favorites" class="view hidden">
        <header class="view-header">
          <div>
            <h1 class="view-title">Favorites</h1>
            <p class="view-subtitle">Your pinned tools, always one click away.</p>
          </div>
        </header>
        <!-- Favorited tool cards rendered here by app.js -->
        <div class="tools-grid" id="favoritesGrid"></div>
      </section>

    </main>

    <!-- ===== MODAL (for built-in tools & iframes) ===== -->
    <div class="modal-overlay hidden" id="modalOverlay">
      <div class="modal" id="modal">
        <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
        <div class="modal-body" id="modalContent"></div>
      </div>
    </div>

    <!-- ===== NICKNAME SETUP MODAL (shown to new users) ===== -->
    <div class="modal-overlay hidden" id="nicknameOverlay">
      <div class="modal" style="max-width:420px;">
        <div class="modal-body" style="padding:36px 32px; text-align:center;">
          <div style="font-size:2.5rem; margin-bottom:16px;">⭐</div>
          <h2 style="margin-bottom:8px; font-family:var(--font-display);">Welcome to StudyVerse!</h2>
          <p style="margin-bottom:24px; color:var(--text-secondary); font-size:0.9rem;">
            Choose a nickname to get started. This is how you'll appear across the app.
          </p>
          <input type="text" id="nicknameSetupInput" class="settings-input"
            style="width:100%; margin-bottom:16px;" maxlength="24"
            placeholder="Your nickname (e.g. Shrey)" autocomplete="off">
          <button class="btn-accent" style="width:100%; padding:12px;" onclick="submitNickname()">
            Let's Go 🚀
          </button>
        </div>
      </div>
    </div>

  </div><!-- /.app-shell -->

  <script src="scripts/app.js"></script>
</body>
</html>
